<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Book icon -->
  <g transform="translate(28,24)">
    <!-- Left page -->
    <rect x="0" y="0" width="38" height="56" rx="6" fill="#a19b94"/>
    <!-- Right page -->
    <rect x="38" y="0" width="38" height="56" rx="6" fill="#e3ded9"/>
    <!-- Spine -->
    <rect x="36" y="0" width="4" height="56" fill="#3a3633"/>

    <!-- Progress bar background -->
    <rect x="6" y="64" width="64" height="6" rx="3" fill="#3a3633"/>
    <!-- Progress -->
    <rect x="6" y="64" width="40" height="6" rx="3" fill="#94b491"/>
  </g>

  <!-- Text -->
  <text x="120" y="70"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="36"
        font-weight="700"
        fill="#e3ded9">
    Bookapp
  </text>
</svg>
